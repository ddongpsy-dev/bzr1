<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BZR — 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #030508;
      --bg-1:     #070c12;
      --bg-2:     #0c1420;
      --bg-3:     #111d2e;
      --border:   #0f1e30;
      --border-2: #162840;
      --border-3: #1e3a5a;
      --mute-2:   #2e5a8a;
      --mute-1:   #4a7ab0;
      --text-2:   #6a9ac8;
      --text-1:   #a0bcd8;
      --white:    #e8f0f8;
      --cyan:     #38bdf8;
      --cyan-dim: rgba(56,189,248,0.08);
      --red:      #ef4444;
      --green:    #22d3a5;
      --sans:     'Space Grotesk', -apple-system, sans-serif;
      --mono:     'JetBrains Mono', monospace;
    }
    html, body {
      height: 100%; background: var(--bg);
      color: var(--text-1); font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    /* 배경 캔버스 */
    #bgCanvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

    /* 초기 로딩 오버레이 (세션 체크 중) */
    #loadingOverlay {
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      transition: opacity 0.3s;
    }
    #loadingOverlay.hidden { opacity: 0; pointer-events: none; }
    .loading-logo { font-family: var(--mono); font-size: 22px; color: var(--white); letter-spacing: 0.1em; }
    .loading-logo em { color: var(--cyan); font-style: normal; }
    .loading-spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border-2); border-top-color: var(--cyan);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 메인 래퍼 */
    #loginWrap {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 20px;
      opacity: 0; transition: opacity 0.4s;
    }
    #loginWrap.visible { opacity: 1; }

    /* 카드 */
    .card {
      width: 100%; max-width: 400px;
      background: var(--bg-1);
      border: 1px solid var(--border-2);
      border-radius: 16px;
      padding: clamp(28px, 5vw, 44px) clamp(20px, 5vw, 36px);
      box-shadow: 0 0 0 1px rgba(56,189,248,0.04), 0 24px 80px rgba(2,132,199,0.08);
      position: relative; overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0.5;
    }

    /* 로고 */
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo-mark {
      width: 28px; height: 28px; border: 1.5px solid var(--cyan);
      border-radius: 5px; display: grid;
      grid-template-columns: 1fr 1fr; gap: 3px; padding: 5px;
    }
    .logo-mark span { background: var(--cyan); border-radius: 1px; display: block; }
    .logo-mark span:nth-child(2), .logo-mark span:nth-child(3) { opacity: 0.25; }
    .logo-text { font-family: var(--mono); font-size: 18px; font-weight: 500; letter-spacing: 0.1em; color: var(--white); }
    .logo-text em { color: var(--cyan); font-style: normal; }

    /* 헤드라인 */
    h1 { font-size: clamp(20px, 5vw, 26px); font-weight: 700; line-height: 1.25; letter-spacing: -0.03em; color: var(--white); margin-bottom: 8px; }
    h1 span { color: var(--cyan); }
    .desc { font-size: 13px; line-height: 1.75; color: var(--text-2); margin-bottom: 24px; }

    /* 스탯 */
    .stats { display: flex; background: var(--bg-2); border: 1px solid var(--border-2); border-radius: 10px; margin-bottom: 22px; overflow: hidden; }
    .stat { flex: 1; padding: 12px 8px; text-align: center; }
    .stat + .stat { border-left: 1px solid var(--border-2); }
    .stat-v { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--cyan); display: block; margin-bottom: 3px; }
    .stat-l { font-size: 10px; color: var(--mute-1); }

    /* 동의 체크박스 */
    .consent {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 16px; background: var(--bg-2);
      border: 1px solid var(--border-2); border-radius: 10px;
      cursor: pointer; margin-bottom: 18px;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .consent.checked { border-color: var(--cyan); background: rgba(56,189,248,0.04); }
    .consent input { display: none; }
    .checkbox {
      width: 18px; height: 18px; min-width: 18px;
      border: 1.5px solid var(--border-3); border-radius: 4px;
      background: var(--bg-3); margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; color: transparent; flex-shrink: 0;
    }
    .consent.checked .checkbox { background: var(--cyan); border-color: var(--cyan); color: #000; }
    .checkbox svg { width: 11px; height: 9px; }
    .consent-txt { font-size: 13px; line-height: 1.6; color: var(--text-1); }
    .consent-txt small { font-size: 11px; color: var(--mute-1); display: block; margin-top: 2px; }

    /* 에러 메시지 */
    #errorMsg {
      display: none; background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.3); border-radius: 8px;
      padding: 10px 14px; margin-bottom: 14px;
      font-size: 12px; color: var(--red); line-height: 1.5;
    }
    #errorMsg.show { display: block; }

    /* 구글 버튼 */
    .btn-google {
      width: 100%; padding: 14px 20px;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: var(--white); color: #1a1a2e;
      border: none; border-radius: 10px;
      font-family: var(--sans); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(56,189,248,0.12);
      margin-bottom: 14px;
    }
    .btn-google:hover:not(:disabled) {
      box-shadow: 0 6px 28px rgba(56,189,248,0.22);
      transform: translateY(-1px);
    }
    .btn-google:disabled {
      background: var(--bg-3); color: var(--mute-2);
      cursor: not-allowed; box-shadow: none; transform: none;
    }
    .btn-google:disabled .g-icon { opacity: 0.3; }
    .g-icon { width: 20px; height: 20px; flex-shrink: 0; }

    .note { font-size: 11px; color: var(--mute-1); text-align: center; line-height: 1.6; }
    .note a { color: var(--text-2); text-underline-offset: 2px; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .card { animation: fadeUp 0.5s ease 0.1s both; }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- 세션 체크 중 로딩 오버레이 -->
<div id="loadingOverlay">
  <div class="loading-logo">BZ<em>R</em></div>
  <div class="loading-spinner"></div>
</div>

<!-- 로그인 카드 -->
<div id="loginWrap">
  <div class="card">
    <div class="logo">
      <div class="logo-mark"><span></span><span></span><span></span><span></span></div>
      <div class="logo-text">BZ<em>R</em></div>
    </div>

    <h1>데이터로 납득하는<br><span>전략적 점성술</span></h1>
    <p class="desc">출생 좌표를 수학적으로 파싱하여<br>당신의 인생 궤적을 정밀 분석합니다.</p>

    <div class="stats">
      <div class="stat"><span class="stat-v">0.1°</span><span class="stat-l">정밀도</span></div>
      <div class="stat"><span class="stat-v">12H</span><span class="stat-l">하우스</span></div>
      <div class="stat"><span class="stat-v">AI</span><span class="stat-l">엔진</span></div>
    </div>

    <label class="consent" id="consentLabel">
      <input type="checkbox" id="consentCheck">
      <div class="checkbox">
        <svg viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="consent-txt">
        마케팅 정보 수신에 동의합니다.
        <small>분석 리포트 및 업데이트 소식을 받아보세요.</small>
      </div>
    </label>

    <div id="errorMsg"></div>

    <button class="btn-google" id="btnLogin" disabled>
      <svg class="g-icon" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span id="btnTxt">Google로 시작하기</span>
    </button>

    <p class="note">로그인 시 <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의합니다.</p>
  </div>
</div>

<script type="module">
import { initializeApp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey:            "AIzaSyBl_yRpX6zQMdv-JABokRfIgUu35bGZsoI",
  authDomain:        "bzr-proj.firebaseapp.com",
  projectId:         "bzr-proj",
  storageBucket:     "bzr-proj.firebasestorage.app",
  messagingSenderId: "130300251259",
  appId:             "1:130300251259:web:0573bafb670f33bbfce6de",
};

const app      = initializeApp(firebaseConfig);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();

const overlay      = document.getElementById('loadingOverlay');
const loginWrap    = document.getElementById('loginWrap');
const btnLogin     = document.getElementById('btnLogin');
const btnTxt       = document.getElementById('btnTxt');
const consentCheck = document.getElementById('consentCheck');
const consentLabel = document.getElementById('consentLabel');
const errorMsg     = document.getElementById('errorMsg');

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('show');
}
function hideError() { errorMsg.classList.remove('show'); }

// ── 웹훅 전송 ───────────────────────────────────────────────────────
// bzr_uid 는 클라이언트에서 생성하지 않음
// Make.com 이 google_uid 로 기존 유저를 찾아 bzr_uid 를 결정해서 응답으로 돌려줌
// 응답받은 bzr_uid 를 localStorage 에 저장 (원칙 5번)
const LOGIN_WEBHOOK = 'https://hook.us2.make.com/nguw8u44w84j30qgabcxe7pe2vkaquae';

async function sendDataToWebhook(user) {
  const consentEl        = document.getElementById('consentCheck');
  const marketingConsent = consentEl ? consentEl.checked : false;
  localStorage.setItem('bzr_marketing', marketingConsent ? 'true' : 'false');

  // ★ bzr_uid 를 payload 에 포함하지 않음
  // Make.com 에서 google_uid 로 시트를 검색 →
  //   기존 유저: 시트의 bzr_uid 반환
  //   신규 유저: 새 bzr_uid 생성 후 등록하고 반환
  const payload = {
    google_uid:        user.uid,
    email:             user.email,
    display_name:      user.displayName,
    marketing_consent: marketingConsent,
  };

  console.log('[BZR] → Login webhook payload:', payload);

  const res = await fetch(LOGIN_WEBHOOK, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(payload),
  });

  if (!res.ok) throw new Error(`Webhook HTTP ${res.status}`);

  // 응답 파싱 (JSON / plain text 모두 대응)
  const rawText = await res.text();
  console.log('[BZR] ← Login webhook raw response:', rawText);

  let data = {};
  try {
    const parsed = JSON.parse(rawText);
    data = typeof parsed === 'string' ? JSON.parse(parsed) : parsed;
  } catch {
    console.warn('[BZR] Response parse failed:', rawText);
  }
  console.log('[BZR] ← Login webhook parsed:', data);

  // 유저 정보 localStorage 저장 (bzr_uid 복원 시 재사용)
  if (user.email)       localStorage.setItem('bzr_email',        user.email);
  if (user.displayName) localStorage.setItem('bzr_display_name', user.displayName);

  // ★ 원칙 5: Make.com 이 확정한 bzr_uid 를 localStorage 에 저장
  if (data.bzr_uid) {
    localStorage.setItem('bzr_uid', data.bzr_uid);
    console.log('[BZR] bzr_uid saved from server:', data.bzr_uid);
  } else {
    // Make.com Respond to Webhook 에서 bzr_uid 를 반환하지 않은 경우
    console.error('[BZR] ❌ bzr_uid not in response! Make.com 설정 확인 필요');
  }

  if (data.current_credit !== undefined)
    localStorage.setItem('bzr_credit', String(data.current_credit));
}

// ── 모바일 감지 ─────────────────────────────────────────────────────
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

// ── 로그인 버튼 클릭 여부 플래그
// onAuthStateChanged 가 signInWithPopup 직후 먼저 발화해서
// 웹훅 실행 전에 페이지를 가져가는 것을 막기 위한 장치
let loginInProgress = false;

// ── 1. 세션 체크 ────────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (user) {
    // loginInProgress = true 이면 버튼 클릭 흐름이 제어 중 → 무시
    if (loginInProgress) return;

    // 기존 세션 or 모바일 리다이렉트 복귀
    // bzr_uid 없으면 웹훅 재호출 (최대 3회 재시도)
    if (!localStorage.getItem('bzr_uid')) {
      let retries = 3;
      while (retries-- > 0) {
        try {
          await sendDataToWebhook(user);
          if (localStorage.getItem('bzr_uid')) break; // 성공 시 종료
          console.warn('[BZR] bzr_uid still missing, retrying...', retries);
          await new Promise(r => setTimeout(r, 1000)); // 1초 대기 후 재시도
        } catch(e) {
          console.error('[BZR] Session webhook error:', e);
          await new Promise(r => setTimeout(r, 1000));
        }
      }
    }
    window.location.replace('./dashboard.html');
    return;
  }
  // 비로그인 → 로그인 화면 표시
  overlay.classList.add('hidden');
  loginWrap.classList.add('visible');
});

// ── 2. 동의 체크박스 ──────────────────────────────────────────────────
consentCheck.addEventListener('change', () => {
  btnLogin.disabled = !consentCheck.checked;
  consentLabel.classList.toggle('checked', consentCheck.checked);
  hideError();
});

// ── 3. 구글 로그인 — 웹훅 전송 완료 후 리다이렉트 ─────────────────────
btnLogin.addEventListener('click', async () => {
  if (btnLogin.disabled) return;
  hideError();
  btnLogin.disabled  = true;
  btnTxt.textContent = '처리 중...';

  // 플래그 ON: onAuthStateChanged 가 이 흐름에 끼어들지 못하도록 차단
  loginInProgress = true;

  try {
    let user;
    if (isMobile) {
      // 모바일: 리다이렉트 방식 (팝업 차단 우회)
      await signInWithRedirect(auth, provider);
      return; // 리다이렉트 후 getRedirectResult 에서 처리
    } else {
      const result = await signInWithPopup(auth, provider);
      user = result.user;
    }

    btnTxt.textContent = '데이터 전송 중...';

    // 웹훅 전송 (200 OK 대기)
    await sendDataToWebhook(user);

    // 전송 완료 후 이동 (플래그는 페이지가 바뀌므로 자동 소멸)
    window.location.replace('./dashboard.html');

  } catch (err) {
    // 실패 시 플래그 해제 후 버튼 복구
    loginInProgress    = false;
    btnLogin.disabled  = false;
    btnTxt.textContent = 'Google로 시작하기';
    console.error('[BZR] Login/webhook error:', err);

    if (err.code === 'auth/popup-closed-by-user') {
      showError('로그인 창이 닫혔습니다. 다시 시도해주세요.');
    } else if (err.code === 'auth/popup-blocked') {
      showError('팝업이 차단됐습니다. 브라우저 팝업 허용 후 재시도해주세요.');
    } else if (err.message && err.message.startsWith('Webhook')) {
      // 웹훅은 실패했지만 로그인은 완료 → 그냥 이동
      console.warn('[BZR] Webhook failed, proceeding anyway');
      window.location.replace('./dashboard.html');
    } else {
      showError('오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
    }
  }
});

// ── 4. 배경 파티클 ────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('bgCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, particles;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  function init() {
    particles = Array.from({ length: 50 }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.2 + 0.2,
      vx: (Math.random() - 0.5) * 0.2,
      vy: (Math.random() - 0.5) * 0.2,
      op: Math.random() * 0.35 + 0.08,
    }));
  }
  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(56,189,248,${p.op})`;
      ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
    });
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (d < 90) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(56,189,248,${0.05*(1-d/90)})`;
          ctx.lineWidth = 0.5;
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  resize(); init(); draw();
  window.addEventListener('resize', () => { resize(); init(); });
})();
</script>
</body>
</html>
