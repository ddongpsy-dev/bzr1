<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BZR — DATA STRATEGY INTELLIGENCE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #000000;
  --bg-1:      #080808;
  --bg-2:      #0d0d0d;
  --border:    #1a1a1a;
  --border-2:  #242424;
  --white:     #f0f0f0;
  --cyan:      #00f0ff;
  --cyan-dim:  rgba(0,240,255,0.08);
  --sans:      'Inter', -apple-system, sans-serif;
  --mono:      'JetBrains Mono', monospace;
}

body {
  background: var(--bg);
  color: #cccccc;
  font-family: var(--sans);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* SCANLINE EFFECT */
body::after {
  content: ''; position: fixed; inset: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
  background-size: 100% 2px, 3px 100%;
  pointer-events: none; z-index: 9999;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: 52px;
  padding: 0 5vw; display: flex; align-items: center; justify-content: space-between;
  background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px);
}
.nav-logo { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--white); text-decoration: none; letter-spacing: 2px; }
.nav-logo span { color: var(--cyan); }

/* MAIN LAYOUT */
main {
  padding: 100px 5vw;
  max-width: 800px;
  margin: 0 auto;
}

/* UNIFIED INPUT FORM */
.input-container {
  background: var(--bg-1);
  border: 1px solid var(--border);
  padding: 40px;
}
.input-container h2 {
  font-family: var(--mono); font-size: 12px; color: var(--cyan);
  margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase;
}
.input-field { margin-bottom: 25px; }
.input-field label {
  display: block; font-family: var(--mono); font-size: 10px;
  color: #666; text-transform: uppercase; margin-bottom: 8px;
}
.input-field input, .input-field select {
  width: 100%; background: var(--bg-2); border: 1px solid var(--border-2);
  color: var(--white); padding: 12px; font-size: 16px; outline: none;
}
.input-field input:focus { border-color: var(--cyan); }

.btn-start {
  width: 100%; background: var(--cyan); color: #000; border: none;
  padding: 18px; font-family: var(--mono); font-weight: 700;
  cursor: pointer; transition: 0.3s; margin-top: 10px;
}
.btn-start:hover { filter: brightness(1.2); }

/* REPORT STYLING */
#report-display { display: none; }
.report-header { font-size: 28px; font-weight: 700; color: var(--white); margin-bottom: 40px; }

.report-section {
  background: var(--bg-1); border: 1px solid var(--border); margin-bottom: 24px;
}
.report-section-label {
  font-family: var(--mono); font-size: 18px; font-weight: 700;
  color: var(--white); padding: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex; justify-content: space-between; align-items: center;
}
.report-section-text {
  padding: 24px 20px; font-size: 15px; line-height: 1.8;
  color: #ccc; text-align: justify; white-space: pre-wrap;
}

/* FINAL RECOMMENDATION SPECIAL STYLING */
.report-section:last-of-type {
  border: 1px solid var(--cyan);
  background: var(--cyan-dim);
}
.report-section:last-of-type .report-section-label {
  font-size: 22px; color: var(--cyan);
}
.report-section:last-of-type .report-section-text {
  font-size: 17px; color: var(--white); font-weight: 500;
}

/* LOADING */
#loading-screen { display: none; text-align: center; padding: 50px 0; }
.loader { color: var(--cyan); font-family: var(--mono); font-size: 14px; }

</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">BZ<span>R</span> — STRATEGY</a>
  <div style="font-size: 10px; color: #444;">TERMINAL ACTIVE</div>
</nav>

<main>
  <div id="input-screen" class="input-container">
    <h2>Core Data Pipeline</h2>
    
    <div class="input-field">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="성함을 입력하세요">
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
      <div class="input-field">
        <label>Birth Date</label>
        <input type="date" id="birthDate">
      </div>
      <div class="input-field">
        <label>Birth Time</label>
        <input type="time" id="birthTime" value="00:00">
      </div>
    </div>
    
    <div class="input-field">
      <label>Birth Location</label>
      <select id="location">
        <option value="Seoul">서울 (Seoul)</option>
        <option value="Busan">부산 (Busan)</option>
        <option value="Incheon">인천 (Incheon)</option>
        <option value="Daegu">대구 (Daegu)</option>
        <option value="Daejeon">대전 (Daejeon)</option>
        <option value="Gwangju">광주 (Gwangju)</option>
        <option value="Ulsan">울산 (Ulsan)</option>
        <option value="Other">기타 (Other)</option>
      </select>
    </div>
    
    <button class="btn-start" onclick="startAnalysis()">운명 데이터 해킹 시작 →</button>
  </div>

  <div id="loading-screen">
    <div class="loader">SYTEM: ANALYZING CELESTIAL COORDINATES...</div>
  </div>

  <div id="report-display">
    <div class="report-header"><span id="user-name"></span>님의 전략 리포트</div>
    <div id="report-content"></div>
    <button class="btn-start" style="background:none; border:1px solid #333; color:#666; margin-top:40px;" onclick="location.reload()">새로운 분석 수행</button>
  </div>
</main>

<script>
async function startAnalysis() {
  const name = document.getElementById('name').value;
  const date = document.getElementById('birthDate').value;
  const time = document.getElementById('birthTime').value;
  const loc = document.getElementById('location').value;

  if(!name || !date) {
    alert("모든 필수 데이터를 입력해주세요.");
    return;
  }

  // 화면 전환
  document.getElementById('input-screen').style.display = 'none';
  document.getElementById('loading-screen').style.display = 'block';

  const payload = {
    name: name,
    date: date,
    time: time,
    location: loc
  };

  try {
    // 실제 Make.com 웹훅 주소로 교체하세요
    const response = await fetch('https://hook.us2.make.com/fhxbp2jnyn9fy3enuod13g1279cemjq0', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (response.ok) {
      const data = await response.json();
      displayReport(name, data.report || data.output);
    } else {
      throw new Error("서버 응답 오류");
    }
  } catch (error) {
    alert("데이터 분석 중 오류가 발생했습니다.");
    location.reload();
  }
}

function displayReport(name, rawText) {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('report-display').style.display = 'block';
  document.getElementById('user-name').innerText = name;

  const contentArea = document.getElementById('report-content');
  contentArea.innerHTML = '';

  // 두 번 이상의 줄바꿈을 기준으로 섹션 분리
  const sections = rawText.split(/\n{2,}/);

  sections.forEach((section, index) => {
    const lines = section.trim().split('\n');
    const title = lines[0];
    const body = lines.slice(1).join('\n');

    if (!body) return; // 제목만 있는 경우 방지

    const sectionEl = document.createElement('div');
    sectionEl.className = 'report-section';
    
    sectionEl.innerHTML = `
      <div class="report-section-label">
        ${title}
        <span style="font-size:10px; opacity:0.4;">0${index + 1}</span>
      </div>
      <div class="report-section-text">${body}</div>
    `;
    
    contentArea.appendChild(sectionEl);
  });
}
</script>
</body>
</html>
