<style>
/* ═══════════════════════════════════════════════════════════════
   BZR CORE UI (ORIGINAL DESIGN PRESERVED)
═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #000000; --bg-1: #080808; --bg-2: #0d0d0d;
  --border: #1a1a1a; --border-2: #242424;
  --white: #f0f0f0; --cyan: #00f0ff; --cyan-dim: rgba(0,240,255,0.08);
  --text-1: #cccccc; --sans: 'Inter', sans-serif; --mono: 'JetBrains Mono', monospace;
}
body { background: var(--bg); color: var(--text-1); font-family: var(--sans); overflow-x: hidden; cursor: crosshair; }
body::after { content: ''; position: fixed; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); animation: scanline 8s linear infinite; pointer-events: none; z-index: 9999; opacity: 0.15; }
@keyframes scanline { 0%{top:-1px} 100%{top:100vh} }

/* ─── UNIFIED INPUT UI ─── */
main { padding: 100px 5vw; max-width: 800px; margin: 0 auto; min-height: 100vh; }
.unified-card { background: var(--bg-1); border: 1px solid var(--border); padding: 40px; position: relative; }
.unified-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--cyan); }
.form-title { font-family: var(--mono); font-size: 11px; color: var(--cyan); margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }
.input-field { margin-bottom: 25px; }
.input-field label { display: block; font-family: var(--mono); font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 8px; }
.field-input { width: 100%; background: var(--bg-2); border: 1px solid var(--border-2); color: var(--white); padding: 14px; font-size: 15px; outline: none; transition: 0.3s; }
.field-input:focus { border-color: var(--cyan); }

.btn-run { width: 100%; background: var(--cyan); color: #000; border: none; padding: 18px; font-family: var(--mono); font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }

/* ─── REPORT DESIGN ─── */
#reportState { display: none; }
.report-header { font-size: 32px; font-weight: 700; color: var(--white); margin-bottom: 40px; }
.report-section { background: var(--bg-1); border: 1px solid var(--border); margin-bottom: 30px; }
.report-section-label { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--white); padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 12px; }
.report-section-label::before { content: ''; width: 4px; height: 4px; background: var(--cyan); border-radius: 50%; }
.report-section-text { padding: 24px 20px; font-size: 14.5px; line-height: 1.9; color: #ccc; text-align: justify; white-space: pre-wrap; }

/* 마지막 섹션 강조 */
.report-section:last-of-type { border: 1px solid var(--cyan); background: var(--cyan-dim); }
.report-section:last-of-type .report-section-label { font-size: 24px; color: var(--cyan); }
.report-section:last-of-type .report-section-text { font-size: 16.5px; color: var(--white); font-weight: 500; }

#loadingState { display: none; text-align: center; padding: 60px 0; font-family: var(--mono); color: var(--cyan); }
</style>
</head>
<body>

<nav style="height:52px; background:rgba(0,0,0,0.8); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 5vw; position:fixed; top:0; left:0; right:0; z-index:10000;">
  <div style="font-family:var(--mono); color:var(--white); font-size:14px; font-weight:700; letter-spacing:2px;">BZ<span style="color:var(--cyan)">R</span></div>

    <button class="btn-run" style="background:none; border:1px solid #333; color:#666; margin-top:40px;" onclick="location.reload()">RE-ANALYZE</button>
  </div>
</main>
